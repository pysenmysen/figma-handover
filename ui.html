<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grebbans Handover</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --comp: #8A38F5;
    --comp-15: rgba(138,56,245,0.15);
    --blocked: #FF223F;
    --pending: #FF8D22;
    --bg: #0F0F0F;
    --surface: #1A1A1A;
    --surface2: #222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #F0F0F0;
    --muted: rgba(240,240,240,0.45);
    --mono: 'SF Mono','Fira Code',monospace;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system,'Helvetica Neue',sans-serif;
    font-size: 12px; height: 100vh;
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* Header */
  .hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 0.5px solid var(--border2);
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-mark {
    width: 22px; height: 22px; border-radius: 5px; background: var(--comp);
    display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 4px;
  }
  .logo-mark span { display: block; border-radius: 1px; background: white; }
  .logo-mark span:nth-child(2), .logo-mark span:nth-child(3) { opacity: 0.55; }
  .logo-mark span:nth-child(4) { opacity: 0.25; }
  .logo-name { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .logo-sub  { font-size: 10px; color: var(--muted); }
  .hdr-meta  { font-size: 10px; color: var(--muted); font-family: var(--mono); }

  /* Buttons */
  .btn { font-size: 11px; font-weight: 500; border-radius: 6px; border: none; cursor: pointer; padding: 5px 12px; font-family: inherit; }
  .btn-primary { background: var(--comp); color: white; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ghost { background: transparent; color: var(--muted); border: 0.5px solid var(--border2); }
  .btn-ghost:hover { color: var(--text); }
  .btn-sm { font-size: 10px; padding: 3px 8px; background: var(--surface2); color: var(--muted); border: 0.5px solid var(--border); border-radius: 4px; cursor: pointer; font-family: inherit; }
  .btn-sm:hover { color: var(--comp); border-color: var(--comp); }
  .hdr-btns { display: flex; gap: 6px; align-items: center; }

  /* Tabs */
  .tabs { display: flex; gap: 2px; padding: 8px 14px 0; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  .tab { font-size: 11px; font-weight: 500; color: var(--muted); padding: 5px 12px; border-radius: 6px 6px 0 0; cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -0.5px; font-family: inherit; }
  .tab.active { color: var(--comp); border-bottom-color: var(--comp); }
  .tab:hover:not(.active) { color: var(--text); }

  /* Main split pane */
  .main { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }
  .pane { overflow-y: auto; padding: 12px 14px; border-right: 0.5px solid var(--border); }
  .pane:last-child { border-right: none; }
  .pane-hdr { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }

  /* Empty state */
  .empty { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted); }
  .empty-icon { font-size: 28px; opacity: 0.25; }

  /* Section */
  .sec { margin-bottom: 18px; }
  .sec-title { font-size: 10px; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 7px; padding-bottom: 5px; border-bottom: 0.5px solid var(--border); }

  /* Color cards */
  .color-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 5px; }
  .color-grid-3 { grid-template-columns: repeat(3,1fr); }
  .color-card { border: 0.5px solid var(--border); border-radius: 7px; overflow: hidden; }
  .color-swatch { height: 36px; }
  .color-meta { padding: 6px 8px; background: var(--surface); }
  .cn { font-size: 10px; font-family: var(--mono); font-weight: 500; color: var(--text); }
  .ch { font-size: 9px; font-family: var(--mono); color: var(--muted); margin-top: 1px; }
  .cv { font-size: 9px; font-family: var(--mono); color: var(--comp); margin-top: 1px; }

  /* Number tokens */
  .num-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 5px; }
  .num-grid-2 { grid-template-columns: repeat(2,1fr); }
  .num-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 7px; padding: 8px; display: flex; flex-direction: column; gap: 5px; }
  .num-bar-w { height: 3px; background: var(--border2); border-radius: 2px; }
  .num-bar { height: 100%; background: var(--comp); border-radius: 2px; }
  .radius-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 7px; padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .radius-demo { width: 36px; height: 36px; background: var(--comp-15); border: 1.5px solid var(--comp); }

  /* String row */
  .str-row { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 0.5px solid var(--border); border-radius: 6px; padding: 6px 9px; margin-bottom: 4px; gap: 6px; }

  /* Text style card */
  .ts-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 7px; padding: 10px; margin-bottom: 5px; }
  .ts-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
  .badge { font-size: 9px; font-family: var(--mono); background: var(--surface2); color: var(--muted); border: 0.5px solid var(--border); padding: 2px 6px; border-radius: 3px; }
  .badge-p { background: var(--comp-15); color: var(--comp); border-color: transparent; }

  /* Effect card */
  .ef-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 7px; padding: 10px; margin-bottom: 5px; display: flex; gap: 10px; align-items: center; }
  .ef-demo { width: 36px; height: 36px; border-radius: 6px; background: var(--surface2); flex-shrink: 0; }
  .ef-name { font-size: 11px; font-weight: 500; }
  .ef-css  { font-size: 9px; font-family: var(--mono); color: var(--muted); margin-top: 3px; word-break: break-all; }

  /* Grid card */
  .grid-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 7px; padding: 10px; margin-bottom: 5px; }
  .grid-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 2px; }
  .grid-label { color: var(--muted); }
  .grid-val { font-family: var(--mono); }

  /* CSS block */
  .css-block { background: var(--surface); border: 0.5px solid var(--border); border-radius: 7px; padding: 10px 12px; font-family: var(--mono); font-size: 10px; line-height: 1.9; white-space: pre-wrap; word-break: break-word; }
  .cp { color: var(--comp); }
  .cv2 { color: #7EC8A4; }
  .cm { color: var(--muted); }

  /* Grid note */
  .grid-note { font-size: 10px; color: var(--muted); padding: 5px 9px; border-left: 2px solid var(--border2); margin-bottom: 7px; font-style: italic; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">
    <div class="logo-mark"><span></span><span></span><span></span><span></span></div>
    <div>
      <div class="logo-name">Grebbans</div>
      <div class="logo-sub" id="file-name">Style Reference</div>
    </div>
  </div>
  <div class="hdr-btns">
    <span class="hdr-meta" id="meta"></span>
    <button class="btn btn-ghost" id="btn-json">Export JSON</button>
    <button class="btn btn-primary" id="btn-extract">Extract styles</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="vars">Variables</button>
  <button class="tab" data-tab="text">Text</button>
  <button class="tab" data-tab="effects">Effects</button>
  <button class="tab" data-tab="grids">Grids</button>
</div>

<div class="main" id="main">
  <div class="empty">
    <div class="empty-icon">◈</div>
    <p>Click "Extract styles" to begin</p>
  </div>
</div>

<script>
var data = null;
var tab = 'vars';

document.querySelectorAll('.tab').forEach(function(t) {
  t.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
    t.classList.add('active');
    tab = t.dataset.tab;
    if (data) render();
  });
});

document.getElementById('btn-extract').addEventListener('click', function() {
  document.getElementById('btn-extract').textContent = 'Extracting…';
  parent.postMessage({ pluginMessage: { type: 'extract' } }, '*');
});

document.getElementById('btn-json').addEventListener('click', function() {
  if (!data) return;
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'grebbans-tokens.json';
  a.click();
});

window.onmessage = function(event) {
  var msg = event.data.pluginMessage;
  if (!msg || msg.type !== 'data') return;
  data = msg.payload;
  document.getElementById('btn-extract').textContent = 'Re-extract';
  document.getElementById('file-name').textContent = data.fileName || 'Style Reference';
  var d = new Date(data.extractedAt);
  document.getElementById('meta').textContent = d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  render();
};

function render() {
  var main = document.getElementById('main');
  main.innerHTML = '';
  if (tab === 'vars')    renderVars(main);
  if (tab === 'text')    renderText(main);
  if (tab === 'effects') renderEffects(main);
  if (tab === 'grids')   renderGrids(main);
}

// ─── Variables ────────────────────────────────────────────────────────────────
function renderVars(main) {
  var left = pane('Visual');
  var right = pane('CSS tokens');
  var css = [':root {'];

  data.variables.forEach(function(col) {
    // Colors
    var nonGrid = col.colors.filter(function(c){ return !c.isGridColor; });
    var gridCols = col.colors.filter(function(c){ return c.isGridColor; });

    // group by group key
    var groups = {};
    nonGrid.forEach(function(c) {
      if (!groups[c.group]) groups[c.group] = [];
      groups[c.group].push(c);
    });

    Object.keys(groups).forEach(function(gKey) {
      var tokens = groups[gKey];
      var sec = section(gKey === 'root' ? col.name + ' · Colors' : gKey);
      var grid = el('div', 'color-grid' + (tokens.length >= 3 ? ' color-grid-3' : ''));
      tokens.forEach(function(c) {
        grid.appendChild(colorCard(c));
        css.push('  ' + c.cssVar + ': ' + cssColor(c) + ';');
      });
      sec.appendChild(grid);
      left.appendChild(sec);
    });

    if (gridCols.length) {
      var sec2 = section('Grid colours · handover only');
      var note = el('div', 'grid-note');
      note.textContent = 'Layout visualisation only — excluded from CSS output';
      sec2.appendChild(note);
      var gg = el('div', 'color-grid');
      gridCols.forEach(function(c){ gg.appendChild(colorCard(c)); });
      sec2.appendChild(gg);
      left.appendChild(sec2);
    }

    // Spacing
    var spacing = col.numbers.filter(function(n){ return n.scopes.includes('GAP'); });
    var radii   = col.numbers.filter(function(n){ return n.scopes.includes('CORNER_RADIUS'); });
    var other   = col.numbers.filter(function(n){ return !n.scopes.includes('GAP') && !n.scopes.includes('CORNER_RADIUS'); });

    if (spacing.length) {
      var sec3 = section('Spacing');
      var maxV = Math.max.apply(null, spacing.map(function(s){ return s.value; }));
      var ng = el('div', 'num-grid');
      spacing.forEach(function(t) {
        ng.appendChild(spaceCard(t, maxV));
        css.push('  ' + t.cssVar + ': ' + t.value + 'px;');
      });
      sec3.appendChild(ng);
      left.appendChild(sec3);
    }

    if (radii.length) {
      var sec4 = section('Radius');
      var rg = el('div', 'num-grid num-grid-2');
      radii.forEach(function(t) {
        rg.appendChild(radiusCard(t));
        css.push('  ' + t.cssVar + ': ' + t.value + 'px;');
      });
      sec4.appendChild(rg);
      left.appendChild(sec4);
    }

    if (other.length) {
      var sec5 = section('Other');
      other.forEach(function(t) {
        var row = strRow(t.name, t.value + 'px', t.cssVar);
        sec5.appendChild(row);
        css.push('  ' + t.cssVar + ': ' + t.value + 'px;');
      });
      left.appendChild(sec5);
    }

    // Strings
    if (col.strings.length) {
      var sec6 = section('Strings');
      col.strings.forEach(function(t) {
        sec6.appendChild(strRow(t.name, t.value, t.cssVar));
        css.push('  ' + t.cssVar + ': ' + JSON.stringify(t.value) + ';');
      });
      left.appendChild(sec6);
    }
  });

  css.push('}');

  // CSS right pane
  var copyBtn = el('button', 'btn-sm');
  copyBtn.textContent = 'Copy CSS';
  copyBtn.onclick = function() {
    navigator.clipboard.writeText(css.join('\n'));
    copyBtn.textContent = 'Copied!';
    setTimeout(function(){ copyBtn.textContent = 'Copy CSS'; }, 1500);
  };
  right.querySelector('.pane-hdr').appendChild(copyBtn);

  var block = el('div', 'css-block');
  block.innerHTML = css.map(function(line) {
    if (line === ':root {' || line === '}') return '<span class="cm">' + esc(line) + '</span>';
    if (line.trim().startsWith('/*')) return '<span class="cm">' + esc(line) + '</span>';
    var parts = line.split(':');
    var prop = parts[0];
    var val  = parts.slice(1).join(':');
    return '<span class="cp">' + esc(prop) + '</span><span class="cm">:</span><span class="cv2">' + esc(val) + '</span>';
  }).join('\n');
  right.appendChild(block);

  main.appendChild(left);
  main.appendChild(right);
}

// ─── Text Styles ──────────────────────────────────────────────────────────────
function renderText(main) {
  var left = pane('Visual');
  var right = pane('CSS classes');
  var css = [];

  if (!data.textStyles.length) {
    left.appendChild(emptyMsg('No text styles found'));
  }

  data.textStyles.forEach(function(s) {
    var card = el('div', 'ts-card');
    var lbl = el('div', '');
    lbl.style.cssText = 'font-size:9px;font-family:var(--mono);color:var(--muted);margin-bottom:5px;';
    lbl.textContent = s.name;
    var badges = el('div', 'ts-badges');
    badges.innerHTML = '<span class="badge badge-p">' + s.fontSize + 'px</span><span class="badge">' + s.fontStyle + '</span><span class="badge">' + s.lineHeight + '</span>';
    var sample = el('div', '');
    sample.style.cssText = 'font-family:"' + s.fontFamily + '",sans-serif;font-size:' + Math.min(s.fontSize,24) + 'px;line-height:' + s.lineHeight + ';overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:var(--text);';
    sample.textContent = s.name.split('/').pop();
    card.appendChild(lbl); card.appendChild(badges); card.appendChild(sample);
    left.appendChild(card);

    css.push('.' + s.cssClass + ' {');
    css.push('  font-family: "' + s.fontFamily + '", sans-serif;');
    css.push('  font-size: ' + s.fontSize + 'px;');
    css.push('  line-height: ' + s.lineHeight + ';');
    if (s.letterSpacing !== 'normal') css.push('  letter-spacing: ' + s.letterSpacing + ';');
    if (s.textTransform !== 'none') css.push('  text-transform: ' + s.textTransform + ';');
    css.push('}'); css.push('');
  });

  var copyBtn = el('button', 'btn-sm');
  copyBtn.textContent = 'Copy CSS';
  copyBtn.onclick = function() { navigator.clipboard.writeText(css.join('\n')); copyBtn.textContent = 'Copied!'; setTimeout(function(){ copyBtn.textContent = 'Copy CSS'; }, 1500); };
  right.querySelector('.pane-hdr').appendChild(copyBtn);
  var block = el('div', 'css-block');
  block.textContent = css.join('\n');
  right.appendChild(block);

  main.appendChild(left); main.appendChild(right);
}

// ─── Effects ─────────────────────────────────────────────────────────────────
function renderEffects(main) {
  var left = pane('Visual');
  var right = pane('CSS values');

  if (!data.effectStyles.length) left.appendChild(emptyMsg('No effect styles found'));

  data.effectStyles.forEach(function(e) {
    var card = el('div', 'ef-card');
    var demo = el('div', 'ef-demo');
    if (e.type === 'shadow') demo.style.boxShadow = e.cssValue;
    var info = el('div', '');
    info.innerHTML = '<div class="ef-name">' + esc(e.name) + '</div><div class="ef-css">' + esc(e.cssValue || '—') + '</div>';
    card.appendChild(demo); card.appendChild(info);
    left.appendChild(card);
  });

  var block = el('div', 'css-block');
  block.textContent = data.effectStyles.map(function(e) {
    if (!e.cssValue) return '';
    var v = '--effect-' + e.name.toLowerCase().replace(/\s*\/\s*/g,'-').replace(/[^a-z0-9-]/g,'-');
    return v + ': ' + e.cssValue + ';';
  }).filter(Boolean).join('\n') || '/* no effect styles */';
  right.appendChild(block);

  main.appendChild(left); main.appendChild(right);
}

// ─── Grids ────────────────────────────────────────────────────────────────────
function renderGrids(main) {
  var left = pane('Grid styles');
  var right = pane('Notes');

  if (!data.gridStyles.length) left.appendChild(emptyMsg('No column grid styles found'));

  data.gridStyles.forEach(function(g) {
    var card = el('div', 'grid-card');
    card.innerHTML = '<div style="font-size:11px;font-weight:500;margin-bottom:7px;">' + esc(g.name) + '</div>'
      + gridRow('Columns', g.columns)
      + gridRow('Gutter', g.gutter + 'px')
      + gridRow('Margin', g.margin + 'px')
      + (g.breakpoint ? gridRow('Breakpoint', g.breakpoint) : '');
    left.appendChild(card);
  });

  var note = el('div', 'css-block');
  note.style.color = 'var(--muted)';
  note.textContent = '/* Grid colours (in variables) are\n   handover-only overlays:\n\n   grid-pri  #FF0000  10%\n   grid-sec  #0000FF  10%\n   grid-ter  #8A38F5  10%\n\n   These are Figma layout guides only.\n   Not for component styling. */';
  right.appendChild(note);

  main.appendChild(left); main.appendChild(right);
}

// ─── DOM helpers ──────────────────────────────────────────────────────────────
function el(tag, cls) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}
function pane(label) {
  var p = el('div', 'pane');
  var h = el('div', 'pane-hdr');
  h.textContent = label;
  p.appendChild(h);
  return p;
}
function section(title) {
  var s = el('div', 'sec');
  var t = el('div', 'sec-title');
  t.textContent = title;
  s.appendChild(t);
  return s;
}
function emptyMsg(msg) {
  var d = el('div', '');
  d.style.cssText = 'font-size:11px;color:var(--muted);padding:10px 0;';
  d.textContent = msg;
  return d;
}
function cssColor(c) {
  if (c.alpha < 1) {
    var rgb = hexToRgb(c.hex);
    return 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',' + c.alpha + ')';
  }
  return c.hex;
}
function colorCard(c) {
  var card = el('div', 'color-card');
  var sw = el('div', 'color-swatch');
  sw.style.background = cssColor(c);
  if (c.hex === '#FFFFFF' || c.alpha < 0.2) sw.style.border = '0.5px solid var(--border)';
  var meta = el('div', 'color-meta');
  meta.innerHTML = '<div class="cn">' + esc(c.name) + '</div>'
    + '<div class="ch">' + c.hex + (c.alpha < 1 ? ' · ' + Math.round(c.alpha*100) + '%' : '') + '</div>'
    + '<div class="cv">' + c.cssVar + '</div>';
  card.appendChild(sw); card.appendChild(meta);
  return card;
}
function spaceCard(t, maxV) {
  var card = el('div', 'num-card');
  var pct = Math.round((t.value / maxV) * 100);
  card.innerHTML = '<div style="font-size:10px;font-family:var(--mono);font-weight:500;">' + esc(t.name) + '</div>'
    + '<div class="num-bar-w"><div class="num-bar" style="width:' + pct + '%"></div></div>'
    + '<div style="font-size:9px;font-family:var(--mono);color:var(--muted);">' + t.value + 'px</div>'
    + '<div style="font-size:8px;font-family:var(--mono);color:var(--comp);">' + t.cssVar + '</div>';
  return card;
}
function radiusCard(t) {
  var card = el('div', 'radius-card');
  var demo = el('div', 'radius-demo');
  demo.style.borderRadius = t.value + 'px';
  card.appendChild(demo);
  var info = el('div', '');
  info.style.textAlign = 'center';
  info.innerHTML = '<div style="font-size:10px;font-family:var(--mono);font-weight:500;">' + esc(t.name) + '</div>'
    + '<div style="font-size:9px;font-family:var(--mono);color:var(--muted);">' + t.value + 'px</div>'
    + '<div style="font-size:8px;font-family:var(--mono);color:var(--comp);">' + t.cssVar + '</div>';
  card.appendChild(info);
  return card;
}
function strRow(name, val, cssv) {
  var row = el('div', 'str-row');
  row.innerHTML = '<span style="font-family:var(--mono);font-size:10px;">' + esc(name) + '</span>'
    + '<span style="font-family:var(--mono);font-size:10px;color:var(--muted);">' + esc(String(val)) + '</span>'
    + '<span style="font-family:var(--mono);font-size:9px;color:var(--comp);">' + esc(cssv) + '</span>';
  return row;
}
function gridRow(label, val) {
  return '<div class="grid-row"><span class="grid-label">' + esc(label) + '</span><span class="grid-val">' + esc(String(val)) + '</span></div>';
}
function hexToRgb(hex) {
  return [
    parseInt(hex.slice(1,3),16),
    parseInt(hex.slice(3,5),16),
    parseInt(hex.slice(5,7),16)
  ];
}
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
