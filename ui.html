<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grebbans Handover</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --comp: #8A38F5; --comp-d: #7028e4;
    --green: #2D7D46; --green-d: #246038;
    --bg: #0F0F0F; --surface: #1A1A1A; --surface2: #222;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
    --text: #F0F0F0; --muted: rgba(240,240,240,0.42);
  }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,'Helvetica Neue',sans-serif; font-size:12px; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* Header */
  .hdr { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:0.5px solid var(--border2); flex-shrink:0; }
  .logo { width:24px; height:24px; border-radius:6px; background:var(--comp); display:grid; grid-template-columns:1fr 1fr; gap:2.5px; padding:5px; flex-shrink:0; }
  .logo span { display:block; border-radius:1px; background:white; }
  .logo span:nth-child(2), .logo span:nth-child(3) { opacity:.55; }
  .logo span:nth-child(4) { opacity:.25; }
  .logo-name { font-size:12px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; }
  .logo-sub  { font-size:10px; color:var(--muted); }

  /* Screens */
  .screen { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
  .screen.hidden { display:none !important; }

  /* Main list */
  .list-wrap { flex:1; padding:12px 16px; display:flex; flex-direction:column; gap:6px; }

  .section-card {
    background:var(--surface); border:0.5px solid var(--border);
    border-radius:10px; padding:10px 12px;
    display:flex; align-items:center; gap:12px;
  }
  .section-info { flex:1; min-width:0; }
  .section-name { font-size:12px; font-weight:500; margin-bottom:2px; }
  .section-meta { font-size:10px; color:var(--muted); }

  .btn-gen {
    font-size:11px; font-weight:500; border-radius:7px; border:none;
    cursor:pointer; padding:6px 14px; font-family:inherit;
    background:var(--comp); color:white; white-space:nowrap; flex-shrink:0;
    transition:background .15s;
  }
  .btn-gen:hover { background:var(--comp-d); }
  .btn-gen.update { background:var(--green); }
  .btn-gen.update:hover { background:var(--green-d); }
  .btn-gen:disabled { opacity:.35; cursor:not-allowed; }

  /* Footer */
  .footer {
    padding:12px 16px; border-top:0.5px solid var(--border2);
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0; gap:8px;
  }
  .footer-note { font-size:10px; color:var(--muted); line-height:1.4; flex:1; }
  .btn-all {
    font-size:11px; font-weight:500; border-radius:7px; border:none;
    cursor:pointer; padding:7px 18px; font-family:inherit;
    background:var(--comp); color:white; white-space:nowrap;
    transition:background .15s;
  }
  .btn-all:hover { background:var(--comp-d); }
  .btn-all.has-updates { background:var(--green); }
  .btn-all.has-updates:hover { background:var(--green-d); }

  /* Progress */
  .prog-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; gap:14px; }
  .prog-title { font-size:13px; font-weight:500; }
  .prog-sub { font-size:11px; color:var(--muted); }
  .prog-bar-wrap { width:100%; max-width:260px; height:3px; background:var(--border2); border-radius:2px; overflow:hidden; }
  .prog-bar { height:100%; background:var(--comp); border-radius:2px; transition:width .35s ease; }

  /* Done */
  .done-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:32px; }
  .done-icon { font-size:32px; }
  .done-title { font-size:14px; font-weight:500; }
  .done-sub { font-size:11px; color:var(--muted); text-align:center; }
  .done-btns { display:flex; gap:8px; margin-top:8px; }
  .btn-ghost { background:transparent; color:var(--muted); border:0.5px solid var(--border2); border-radius:7px; padding:7px 16px; font-size:11px; cursor:pointer; font-family:inherit; }
  .btn-ghost:hover { color:var(--text); }

  /* Empty */
  .empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:32px; color:var(--muted); text-align:center; }

  ::-webkit-scrollbar { width:3px; }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
</style>
</head>
<body>

<div class="hdr">
  <div class="logo"><span></span><span></span><span></span><span></span></div>
  <div>
    <div class="logo-name">Grebbans</div>
    <div class="logo-sub" id="ver-sub">Handover · v7.0</div>
  </div>
</div>

<!-- MAIN -->
<div class="screen hidden" id="s-main">
  <div class="list-wrap" id="item-list"></div>
  <div class="footer">
    <div class="footer-note" id="footer-note">Frames are placed inside the ✏️ Style sheet section if it exists.</div>
    <button class="btn-all" id="btn-all" onclick="buildAll()">Generate all</button>
  </div>
</div>

<!-- PROGRESS -->
<div class="screen hidden" id="s-progress">
  <div class="prog-wrap">
    <div class="prog-title">Building…</div>
    <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar" style="width:10%"></div></div>
    <div class="prog-sub" id="prog-sub">Starting…</div>
  </div>
</div>

<!-- DONE -->
<div class="screen hidden" id="s-done">
  <div class="done-wrap">
    <div class="done-icon">✦</div>
    <div class="done-title" id="done-title">Done!</div>
    <div class="done-sub" id="done-sub">Frames updated on canvas.</div>
    <div class="done-btns">
      <button class="btn-ghost" onclick="show('s-main')">← Back</button>
      <button class="btn-all" onclick="parent.postMessage({pluginMessage:{type:'close'}},'*')">Close</button>
    </div>
  </div>
</div>

<!-- EMPTY -->
<div class="screen hidden" id="s-empty">
  <div class="empty">
    <div style="font-size:28px;opacity:.3">⬡</div>
    <div style="font-size:13px;font-weight:500">Nothing to generate</div>
    <div style="font-size:11px">No colour variables or styles found in this file.</div>
  </div>
</div>

<script>
var items = [];
var collectionMap = {};
var buildQueue = [];
var builtCount = 0;

window.onmessage = function(e) {
  var msg = e.data.pluginMessage;
  if (!msg) return;

  if (msg.type === 'init') {
    document.getElementById('ver-sub').textContent = 'Handover · v' + msg.version;
    items = msg.items;
    if (!items.length) { show('s-empty'); return; }
    renderList();
    show('s-main');
  }

  if (msg.type === 'progress') {
    document.getElementById('prog-sub').textContent = msg.name;
    var idx = buildQueue.indexOf(msg.name);
    var pct = buildQueue.length ? Math.round(((idx + 0.5) / buildQueue.length) * 100) : 50;
    document.getElementById('prog-bar').style.width = Math.max(pct, 10) + '%';
  }

  if (msg.type === 'done') {
    // Mark built items as "exists"
    buildQueue.forEach(function(id) {
      var item = items.find(function(i) { return i.id === id || i.name === id; });
      if (item) item.exists = true;
    });
    document.getElementById('prog-bar').style.width = '100%';
    document.getElementById('done-title').textContent = 'Done!';
    document.getElementById('done-sub').textContent = buildQueue.length + ' frame' + (buildQueue.length !== 1 ? 's' : '') + ' built on canvas.';
    setTimeout(function() { show('s-done'); }, 300);
  }

  if (msg.type === 'error') {
    show('s-main');
    document.getElementById('footer-note').textContent = '✗ ' + msg.message;
  }
};

function renderList() {
  var list = document.getElementById('item-list');
  list.innerHTML = '';
  var hasAny = false, hasUpdates = false;

  items.forEach(function(item) {
    hasAny = true;
    if (item.exists) hasUpdates = true;

    var card = document.createElement('div');
    card.className = 'section-card';
    card.innerHTML = '<div class="section-info">'
      + '<div class="section-name">' + esc(item.name) + '</div>'
      + '<div class="section-meta">' + esc(item.meta) + '</div>'
      + '</div>'
      + '<button class="btn-gen' + (item.exists ? ' update' : '') + '" data-id="' + esc(item.id) + '">'
      + (item.exists ? 'Update' : 'Generate')
      + '</button>';

    card.querySelector('.btn-gen').onclick = function() {
      buildTargets([item.id]);
    };
    list.appendChild(card);
  });

  var btnAll = document.getElementById('btn-all');
  if (hasUpdates) {
    btnAll.textContent = 'Update all';
    btnAll.classList.add('has-updates');
  } else {
    btnAll.textContent = 'Generate all';
    btnAll.classList.remove('has-updates');
  }
}

function buildAll() {
  buildTargets(items.map(function(i) { return i.id; }));
}

function buildTargets(ids) {
  buildQueue = ids;
  builtCount = 0;
  document.getElementById('prog-bar').style.width = '10%';
  document.getElementById('prog-sub').textContent = 'Starting…';
  show('s-progress');

  // Build collection map
  var cm = {};
  items.forEach(function(i) { cm[i.id] = i; });

  parent.postMessage({ pluginMessage: {
    type: 'build',
    targets: ids,
    collectionMap: cm
  }}, '*');
}

function show(id) {
  ['s-main','s-progress','s-done','s-empty'].forEach(function(s) {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
