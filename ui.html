<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grebbans Handover</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --comp: #8A38F5; --comp-15: rgba(138,56,245,0.15);
    --bg: #0F0F0F; --surface: #1A1A1A; --surface2: #222;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #F0F0F0; --muted: rgba(240,240,240,0.45);
    --green: #4CAF50;
  }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,'Helvetica Neue',sans-serif; font-size:12px; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* Header */
  .hdr { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:0.5px solid var(--border2); flex-shrink:0; }
  .logo-mark { width:24px; height:24px; border-radius:6px; background:var(--comp); display:grid; grid-template-columns:1fr 1fr; gap:2.5px; padding:5px; flex-shrink:0; }
  .logo-mark span { display:block; border-radius:1px; background:white; }
  .logo-mark span:nth-child(2), .logo-mark span:nth-child(3) { opacity:.55; }
  .logo-mark span:nth-child(4) { opacity:.25; }
  .logo-name { font-size:12px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; }
  .logo-sub  { font-size:10px; color:var(--muted); }

  /* Screens */
  .screen { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
  .screen.hidden { display:none !important; }

  /* Drop zone */
  .drop-wrap { flex:1; display:flex; flex-direction:column; padding:16px; gap:12px; }
  .drop-zone {
    flex:1; border:1.5px dashed var(--border2); border-radius:12px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:8px; cursor:pointer; transition:border-color .15s, background .15s;
    min-height:180px;
  }
  .drop-zone:hover, .drop-zone.over { border-color:var(--comp); background:var(--comp-15); }
  .drop-icon { font-size:28px; opacity:.4; }
  .drop-title { font-size:13px; font-weight:500; }
  .drop-sub   { font-size:11px; color:var(--muted); text-align:center; line-height:1.5; }
  .drop-btn   { font-size:11px; color:var(--comp); background:none; border:none; cursor:pointer; font-family:inherit; text-decoration:underline; padding:0; }
  input[type=file] { display:none; }

  /* Preview */
  .preview { background:var(--surface); border:0.5px solid var(--border); border-radius:10px; padding:12px; display:flex; flex-direction:column; gap:8px; }
  .preview-title { font-size:11px; font-weight:500; }
  .preview-stats { font-size:10px; color:var(--muted); }
  .group-list { display:flex; flex-direction:column; gap:4px; max-height:140px; overflow-y:auto; }
  .group-row { display:flex; align-items:center; justify-content:space-between; font-size:10px; padding:4px 8px; background:var(--surface2); border-radius:6px; }
  .group-name { color:var(--text); font-family:monospace; }
  .group-count { color:var(--comp); }

  /* Footer */
  .footer { padding:12px 16px; border-top:0.5px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .btn { font-size:11px; font-weight:500; border-radius:7px; border:none; cursor:pointer; padding:7px 16px; font-family:inherit; transition:opacity .15s; }
  .btn:disabled { opacity:.35; cursor:not-allowed; }
  .btn-primary { background:var(--comp); color:white; }
  .btn-primary:hover:not(:disabled) { opacity:.85; }
  .btn-ghost { background:transparent; color:var(--muted); border:0.5px solid var(--border2); }
  .btn-ghost:hover { color:var(--text); }
  .footer-note { font-size:10px; color:var(--muted); }

  /* Progress */
  .prog-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; gap:12px; }
  .prog-title { font-size:13px; font-weight:500; }
  .prog-bar-wrap { width:100%; max-width:260px; height:3px; background:var(--border2); border-radius:2px; overflow:hidden; }
  .prog-bar { height:100%; background:var(--comp); border-radius:2px; transition:width .35s ease; }
  .prog-sub { font-size:11px; color:var(--muted); }

  /* Done */
  .done-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:32px; }
  .done-icon { font-size:32px; }
  .done-title { font-size:14px; font-weight:500; }
  .done-sub { font-size:11px; color:var(--muted); text-align:center; line-height:1.5; }
  .done-btns { display:flex; gap:8px; margin-top:8px; }

  ::-webkit-scrollbar { width:3px; }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
</style>
</head>
<body>

<div class="hdr">
  <div class="logo-mark"><span></span><span></span><span></span><span></span></div>
  <div>
    <div class="logo-name">Grebbans</div>
    <div class="logo-sub" id="ver-sub">Colour Variables · v2.0</div>
  </div>
</div>

<!-- IMPORT SCREEN -->
<div class="screen" id="s-import">
  <div class="drop-wrap">
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="drop-icon">⬡</div>
      <div class="drop-title">Drop your token JSON here</div>
      <div class="drop-sub">Supports W3C Design Token format<br>Colours only — strings and numbers are ignored</div>
      <button class="drop-btn">or browse files</button>
    </div>
    <input type="file" id="file-input" accept=".json">

    <div class="preview hidden" id="preview">
      <div class="preview-title" id="preview-title">—</div>
      <div class="preview-stats" id="preview-stats">—</div>
      <div class="group-list" id="group-list"></div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-note" id="footer-note">Select a token JSON file to begin</span>
    <button class="btn btn-primary" id="btn-build" disabled onclick="startBuild()">Build frames</button>
  </div>
</div>

<!-- PROGRESS SCREEN -->
<div class="screen hidden" id="s-progress">
  <div class="prog-wrap">
    <div class="prog-title">Building colour frames…</div>
    <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar" style="width:30%"></div></div>
    <div class="prog-sub">Drawing swatches</div>
  </div>
</div>

<!-- DONE SCREEN -->
<div class="screen hidden" id="s-done">
  <div class="done-wrap">
    <div class="done-icon">✦</div>
    <div class="done-title">Frames built!</div>
    <div class="done-sub" id="done-sub">Colour frames are on your canvas.</div>
    <div class="done-btns">
      <button class="btn btn-ghost" onclick="showImport()">← Import another</button>
      <button class="btn btn-primary" onclick="parent.postMessage({pluginMessage:{type:'close'}},'*')">Close plugin</button>
    </div>
  </div>
</div>

<script>
var parsedGroups = null;

// ─── Drop zone ────────────────────────────────────────────────────────────────
var dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', function() { dz.classList.remove('over'); });
dz.addEventListener('drop', function(e) {
  e.preventDefault(); dz.classList.remove('over');
  var file = e.dataTransfer.files[0];
  if (file) readFile(file);
});
document.getElementById('file-input').addEventListener('change', function(e) {
  if (e.target.files[0]) readFile(e.target.files[0]);
});

function readFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var json = JSON.parse(e.target.result);
      parseTokens(json, file.name);
    } catch(err) {
      document.getElementById('footer-note').textContent = 'Invalid JSON — ' + err.message;
    }
  };
  reader.readAsText(file);
}

// ─── Parse tokens ─────────────────────────────────────────────────────────────
function parseTokens(json, filename) {
  var groups = [];
  var totalColors = 0;

  // Walk the JSON — group by top-level key / nested path
  function walk(obj, path) {
    if (!obj || typeof obj !== 'object') return;

    // Check if this is a token node
    if (obj['$type'] === 'color' && obj['$value']) {
      var val = obj['$value'];
      var hex = val.hex || val;
      var alpha = (val.alpha !== undefined) ? val.alpha : 1;

      // Clean hex
      if (typeof hex === 'string' && hex.startsWith('#') && hex.length >= 7) {
        // Find or create group (all path segments except last)
        var parts = path.split('/');
        var groupKey = parts.length > 1 ? parts.slice(0,-1).join('/') : parts[0];
        var tokenName = '--' + path.replace(/\//g, '-').toLowerCase();

        var group = groups.find(function(g) { return g.key === groupKey; });
        if (!group) { group = { key: groupKey, label: groupKey, tokens: [] }; groups.push(group); }

        group.tokens.push({ name: tokenName, hex: hex.toUpperCase(), alpha: alpha });
        totalColors++;
      }
      return;
    }

    // Skip non-color types
    if (obj['$type'] && obj['$type'] !== 'color') return;

    // Walk children
    Object.keys(obj).forEach(function(key) {
      if (key.startsWith('$') || key.startsWith('@')) return;
      walk(obj[key], path ? path + '/' + key : key);
    });
  }

  walk(json, '');

  if (totalColors === 0) {
    document.getElementById('footer-note').textContent = 'No colour tokens found in this file';
    return;
  }

  parsedGroups = groups;

  // Show preview
  document.getElementById('preview').classList.remove('hidden');
  document.getElementById('preview-title').textContent = filename;
  document.getElementById('preview-stats').textContent = totalColors + ' colours across ' + groups.length + ' groups';

  var list = document.getElementById('group-list');
  list.innerHTML = '';
  groups.forEach(function(g) {
    var row = document.createElement('div');
    row.className = 'group-row';
    row.innerHTML = '<span class="group-name">' + esc(g.label) + '</span>'
      + '<span class="group-count">' + g.tokens.length + ' colour' + (g.tokens.length !== 1 ? 's' : '') + '</span>';
    list.appendChild(row);
  });

  document.getElementById('footer-note').textContent = totalColors + ' colours ready to build';
  document.getElementById('btn-build').disabled = false;
}

// ─── Build ────────────────────────────────────────────────────────────────────
function startBuild() {
  if (!parsedGroups) return;
  show('s-progress');
  parent.postMessage({ pluginMessage: { type: 'build', groups: parsedGroups } }, '*');
}

window.onmessage = function(e) {
  var msg = e.data.pluginMessage;
  if (!msg) return;
  if (msg.type === 'error') { show('s-import'); document.getElementById('footer-note').textContent = 'Error: ' + msg.message; }
  if (msg.type === 'done') {
    document.getElementById('done-sub').textContent =
      parsedGroups.length + ' group' + (parsedGroups.length !== 1 ? 's' : '') + ' drawn on the canvas.';
    show('s-done');
  }
};

function showImport() { show('s-import'); }

function show(id) {
  ['s-import','s-progress','s-done'].forEach(function(s) {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
