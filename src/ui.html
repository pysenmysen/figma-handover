<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grebbans Handover</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gb-comp:       #8A38F5;
    --gb-comp-15:    rgba(138,56,245,0.15);
    --gb-blocked:    #FF223F;
    --gb-pending:    #FF8D22;

    --bg:      #0F0F0F;
    --surface: #1A1A1A;
    --surface2:#222222;
    --border:  rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text:    #F0F0F0;
    --muted:   rgba(240,240,240,0.45);
    --mono:    'SF Mono', 'Fira Code', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 0.5px solid var(--border2);
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-mark {
    width: 22px; height: 22px; border-radius: 5px;
    background: var(--gb-comp);
    display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 4px;
  }
  .logo-mark span {
    display: block; border-radius: 1px;
    background: white;
  }
  .logo-mark span:nth-child(2),
  .logo-mark span:nth-child(3) { opacity: 0.55; }
  .logo-mark span:nth-child(4) { opacity: 0.25; }
  .logo-name { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text); }
  .logo-sub  { font-size: 10px; color: var(--muted); }
  .header-actions { display: flex; gap: 6px; align-items: center; }

  /* ── Buttons ── */
  .btn {
    font-size: 11px; font-weight: 500; border-radius: 6px; border: none;
    cursor: pointer; padding: 5px 12px; transition: opacity 0.15s;
    font-family: inherit;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--gb-comp); color: white; }
  .btn-ghost {
    background: transparent; color: var(--muted);
    border: 0.5px solid var(--border2);
  }
  .btn-ghost:hover { color: var(--text); }
  .btn-copy {
    font-size: 10px; padding: 3px 8px;
    background: var(--surface2); color: var(--muted);
    border: 0.5px solid var(--border);
    border-radius: 4px;
  }
  .btn-copy:hover { color: var(--gb-comp); border-color: var(--gb-comp); }

  /* ── Tabs ── */
  .tabs {
    display: flex; gap: 2px; padding: 8px 14px 0;
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    font-size: 11px; font-weight: 500; color: var(--muted);
    padding: 5px 12px; border-radius: 6px 6px 0 0;
    cursor: pointer; border: none; background: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -0.5px; font-family: inherit;
    transition: color 0.15s;
  }
  .tab.active { color: var(--gb-comp); border-bottom-color: var(--gb-comp); }
  .tab:hover:not(.active) { color: var(--text); }

  /* ── Layout ── */
  .main {
    display: grid; grid-template-columns: 1fr 1fr;
    flex: 1; overflow: hidden;
    gap: 0;
  }
  .pane {
    overflow-y: auto; padding: 14px;
    border-right: 0.5px solid var(--border);
  }
  .pane:last-child { border-right: none; }
  .pane-label {
    font-size: 10px; font-weight: 500; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 12px; display: flex; align-items: center;
    justify-content: space-between;
  }

  /* ── Loading / Empty ── */
  .state-empty {
    grid-column: 1/-1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    height: 100%; color: var(--muted);
  }
  .state-empty .icon { font-size: 32px; opacity: 0.3; }
  .state-empty p { font-size: 13px; }

  /* ── Section ── */
  .section { margin-bottom: 20px; }
  .section-title {
    font-size: 10px; font-weight: 500;
    color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase;
    margin-bottom: 8px; padding-bottom: 5px;
    border-bottom: 0.5px solid var(--border);
  }

  /* ── Color Cards ── */
  .color-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .color-grid-3 { grid-template-columns: repeat(3, 1fr); }
  .color-card {
    border: 0.5px solid var(--border); border-radius: 8px; overflow: hidden;
  }
  .color-swatch { height: 40px; width: 100%; }
  .color-meta { padding: 6px 8px; background: var(--surface); }
  .color-meta-name { font-size: 11px; font-family: var(--mono); font-weight: 500; color: var(--text); }
  .color-meta-hex  { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-top: 1px; }
  .color-meta-var  { font-size: 10px; font-family: var(--mono); color: var(--gb-comp); margin-top: 1px; }

  /* ── Number Tokens (space, radius) ── */
  .num-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .num-grid-5 { grid-template-columns: repeat(5, 1fr); }
  .num-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 10px 10px 8px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .num-name { font-size: 11px; font-family: var(--mono); font-weight: 500; color: var(--text); }
  .num-bar-wrap { height: 4px; background: var(--border2); border-radius: 2px; }
  .num-bar { height: 100%; background: var(--gb-comp); border-radius: 2px; }
  .num-val  { font-size: 10px; font-family: var(--mono); color: var(--muted); }
  .num-var  { font-size: 9px; font-family: var(--mono); color: var(--gb-comp); }

  .radius-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 12px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .radius-demo {
    width: 40px; height: 40px;
    background: var(--gb-comp-15);
    border: 1.5px solid var(--gb-comp);
  }

  /* ── Text Styles ── */
  .text-style-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 12px;
    margin-bottom: 6px;
  }
  .text-style-meta {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;
  }
  .badge {
    font-size: 10px; font-family: var(--mono);
    background: var(--surface2); color: var(--muted);
    border: 0.5px solid var(--border);
    padding: 2px 7px; border-radius: 4px;
  }
  .badge-comp { background: var(--gb-comp-15); color: var(--gb-comp); border-color: transparent; }
  .text-style-sample { color: var(--text); }

  /* ── Effect Styles ── */
  .effect-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 12px;
    margin-bottom: 6px; display: flex; align-items: center; gap: 12px;
  }
  .effect-demo {
    width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0;
    background: var(--surface2);
  }
  .effect-info { flex: 1; min-width: 0; }
  .effect-name { font-size: 11px; font-weight: 500; color: var(--text); }
  .effect-css  { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-top: 3px; word-break: break-all; }

  /* ── Grid Styles ── */
  .grid-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 12px;
    margin-bottom: 6px;
  }
  .grid-card-name { font-size: 11px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
  .grid-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; }
  .grid-row-label { color: var(--muted); }
  .grid-row-val { font-family: var(--mono); color: var(--text); }

  /* ── CSS Pane ── */
  .css-block {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    font-family: var(--mono); font-size: 11px;
    line-height: 1.9; white-space: pre-wrap; word-break: break-word;
    color: var(--text);
  }
  .css-comment { color: var(--muted); }
  .css-prop    { color: var(--gb-comp); }
  .css-val     { color: #7EC8A4; }
  .css-punc    { color: rgba(240,240,240,0.3); }

  /* ── String Tokens ── */
  .string-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 7px; padding: 7px 10px; margin-bottom: 5px;
    gap: 8px;
  }
  .string-name { font-size: 11px; font-family: var(--mono); color: var(--text); }
  .string-val  { font-size: 11px; font-family: var(--mono); color: var(--muted); }
  .string-var  { font-size: 10px; font-family: var(--mono); color: var(--gb-comp); }

  /* ── Grid colour note ── */
  .grid-note {
    font-size: 10px; color: var(--muted);
    padding: 6px 10px; border-left: 2px solid var(--border2);
    margin-bottom: 8px; font-style: italic;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gb-comp); }

  /* ── Panels ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: contents; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-mark">
      <span></span><span></span><span></span><span></span>
    </div>
    <div>
      <div class="logo-name">Grebbans</div>
      <div class="logo-sub" id="file-name">Style Reference</div>
    </div>
  </div>
  <div class="header-actions">
    <span class="logo-sub" id="extract-meta"></span>
    <button class="btn btn-ghost" id="btn-export-json">Export JSON</button>
    <button class="btn btn-primary" id="btn-extract">Extract styles</button>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" data-tab="variables">Variables</button>
  <button class="tab" data-tab="text">Text styles</button>
  <button class="tab" data-tab="effects">Effects</button>
  <button class="tab" data-tab="grids">Grids</button>
</div>

<!-- Main area -->
<div class="main" id="main-area">
  <div class="state-empty">
    <div class="icon">◈</div>
    <p>Click "Extract styles" to load from this file</p>
  </div>
</div>

<script>
let extractedData = null;
let activeTab = 'variables';

// ─── Tab switching ──────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeTab = t.dataset.tab;
    if (extractedData) renderAll();
  });
});

// ─── Extract button ─────────────────────────────────────────────────────────
document.getElementById('btn-extract').addEventListener('click', () => {
  document.getElementById('btn-extract').textContent = 'Extracting…';
  parent.postMessage({ pluginMessage: { type: 'extract' } }, '*');
});

// ─── Export JSON ────────────────────────────────────────────────────────────
document.getElementById('btn-export-json').addEventListener('click', () => {
  if (!extractedData) return;
  const blob = new Blob([JSON.stringify(extractedData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'grebbans-tokens.json'; a.click();
  URL.revokeObjectURL(url);
});

// ─── Receive data ───────────────────────────────────────────────────────────
window.onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg || msg.type !== 'data') return;
  extractedData = msg.payload;
  document.getElementById('btn-extract').textContent = 'Re-extract';
  document.getElementById('file-name').textContent = extractedData.fileName || 'Style Reference';
  const d = new Date(extractedData.extractedAt);
  document.getElementById('extract-meta').textContent =
    d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  renderAll();
};

// ─── Render all ─────────────────────────────────────────────────────────────
function renderAll() {
  const area = document.getElementById('main-area');
  area.innerHTML = '';
  area.style.display = 'grid';
  area.style.gridTemplateColumns = '1fr 1fr';

  if (activeTab === 'variables') renderVariables(area);
  if (activeTab === 'text')      renderTextStyles(area);
  if (activeTab === 'effects')   renderEffects(area);
  if (activeTab === 'grids')     renderGrids(area);
}

// ─── Variables ──────────────────────────────────────────────────────────────
function renderVariables(area) {
  const d = extractedData;
  const leftPane = pane('Visual');
  const rightPane = pane('CSS tokens');
  const cssLines = [':root {'];

  for (const col of d.variables) {
    // ── Colors ──
    if (col.colors.length) {
      const nonGrid = col.colors.filter(c => !c.isGridColor);
      const gridCols = col.colors.filter(c => c.isGridColor);

      // Group non-grid colors by group
      const groups = {};
      for (const c of nonGrid) {
        if (!groups[c.group]) groups[c.group] = [];
        groups[c.group].push(c);
      }

      for (const [gName, tokens] of Object.entries(groups)) {
        const sec = section(gName.replace('root', col.name + ' · Colors'));
        const grid = el('div', 'color-grid' + (tokens.length >= 3 ? ' color-grid-3' : ''));
        for (const c of tokens) {
          grid.appendChild(colorCard(c));
          const alphaVal = c.alpha < 1 ? `rgba(${hexToRgbStr(c.hex)},${c.alpha})` : c.hex;
          cssLines.push(`  /* ${gName} */`);
          cssLines.push(`  ${c.cssVar}: ${alphaVal};`);
        }
        sec.appendChild(grid);
        leftPane.appendChild(sec);
      }

      if (gridCols.length) {
        const sec = section('Grid colours · handover only');
        sec.appendChild(gridNote());
        const grid = el('div', 'color-grid');
        for (const c of gridCols) {
          grid.appendChild(colorCard(c));
        }
        sec.appendChild(grid);
        leftPane.appendChild(sec);
      }
    }

    // ── Numbers ──
    const spacing = col.numbers.filter(n => n.scope.includes('GAP'));
    const radii   = col.numbers.filter(n => n.scope.includes('CORNER_RADIUS'));
    const other   = col.numbers.filter(n =>
      !n.scope.includes('GAP') && !n.scope.includes('CORNER_RADIUS'));

    if (spacing.length) {
      const sec = section('Spacing');
      const grid = el('div', 'num-grid num-grid-5');
      const maxVal = Math.max(...spacing.map(s => s.value));
      for (const t of spacing) {
        grid.appendChild(spaceCard(t, maxVal));
        cssLines.push(`  ${t.cssVar}: ${t.value}${t.unit};`);
      }
      sec.appendChild(grid);
      leftPane.appendChild(sec);
    }

    if (radii.length) {
      const sec = section('Radius');
      const grid = el('div', 'num-grid');
      for (const t of radii) {
        grid.appendChild(radiusCard(t));
        cssLines.push(`  ${t.cssVar}: ${t.value}${t.unit};`);
      }
      sec.appendChild(grid);
      leftPane.appendChild(sec);
    }

    if (other.length) {
      const sec = section('Other numbers');
      for (const t of other) {
        const row = el('div', 'string-row');
        row.innerHTML = `<span class="string-name">${t.name}</span><span class="string-val">${t.value}${t.unit}</span><span class="string-var">${t.cssVar}</span>`;
        sec.appendChild(row);
        cssLines.push(`  ${t.cssVar}: ${t.value}${t.unit};`);
      }
      leftPane.appendChild(sec);
    }

    // ── Strings ──
    if (col.strings.length) {
      const sec = section('String tokens');
      for (const t of col.strings) {
        const row = el('div', 'string-row');
        row.innerHTML = `<span class="string-name">${t.name}</span><span class="string-val">${t.value}</span><span class="string-var">${t.cssVar}</span>`;
        sec.appendChild(row);
        cssLines.push(`  ${t.cssVar}: ${JSON.stringify(t.value)};`);
      }
      leftPane.appendChild(sec);
    }
  }

  cssLines.push('}');

  // CSS pane
  const cssLabel = el('div', 'pane-label');
  const copyBtn = el('button', 'btn-copy');
  copyBtn.textContent = 'Copy';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(cssLines.join('\n'));
    copyBtn.textContent = 'Copied!';
    setTimeout(() => copyBtn.textContent = 'Copy', 1500);
  };
  cssLabel.appendChild(document.createTextNode('CSS custom properties'));
  cssLabel.appendChild(copyBtn);
  rightPane.insertBefore(cssLabel, rightPane.firstChild.nextSibling);

  const block = el('div', 'css-block');
  block.innerHTML = cssLines.map(line => {
    if (line.startsWith('  /*')) return `<span class="css-comment">${esc(line)}</span>`;
    if (line.startsWith('  --')) {
      const [prop, ...rest] = line.split(':');
      return `<span class="css-prop">${esc(prop)}</span><span class="css-punc">:</span><span class="css-val">${esc(rest.join(':'))}</span>`;
    }
    return `<span class="css-punc">${esc(line)}</span>`;
  }).join('\n');
  rightPane.appendChild(block);

  area.appendChild(leftPane);
  area.appendChild(rightPane);
}

// ─── Text Styles ─────────────────────────────────────────────────────────────
function renderTextStyles(area) {
  const styles = extractedData.textStyles;
  const leftPane = pane('Visual');
  const rightPane = pane('CSS classes');
  const cssLines = [];

  for (const s of styles) {
    // Visual card
    const card = el('div', 'text-style-card');
    const meta = el('div', 'text-style-meta');
    meta.innerHTML = `
      <span class="badge badge-comp">${s.fontSize}px</span>
      <span class="badge">${s.fontStyle}</span>
      <span class="badge">${s.lineHeight}</span>
      ${s.letterSpacing !== 'normal' ? `<span class="badge">${s.letterSpacing}</span>` : ''}
    `;
    const sample = el('div', 'text-style-sample');
    sample.style.cssText = `
      font-family: "${s.fontFamily}", sans-serif;
      font-size: ${Math.min(s.fontSize, 28)}px;
      line-height: ${s.lineHeight};
      letter-spacing: ${s.letterSpacing};
      text-transform: ${s.textTransform};
      color: var(--text);
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    `;
    sample.textContent = s.name.split('/').pop();
    const nameEl = el('div', '');
    nameEl.style.cssText = 'font-size:10px;color:var(--muted);margin-bottom:6px;font-family:var(--mono)';
    nameEl.textContent = s.name;
    card.appendChild(nameEl);
    card.appendChild(meta);
    card.appendChild(sample);
    leftPane.appendChild(card);

    // CSS
    cssLines.push(`.${s.cssClass} {`);
    cssLines.push(`  font-family: "${s.fontFamily}", sans-serif;`);
    cssLines.push(`  font-size: ${s.fontSize}px;`);
    cssLines.push(`  font-weight: ${s.fontStyle.toLowerCase().includes('bold') ? 700 : s.fontStyle.toLowerCase().includes('medium') ? 500 : 400};`);
    cssLines.push(`  line-height: ${s.lineHeight};`);
    if (s.letterSpacing !== 'normal') cssLines.push(`  letter-spacing: ${s.letterSpacing};`);
    if (s.textTransform !== 'none') cssLines.push(`  text-transform: ${s.textTransform};`);
    cssLines.push(`}`);
    cssLines.push(``);
  }

  if (!styles.length) {
    leftPane.appendChild(emptyNote('No text styles found in this file'));
  }

  const block = el('div', 'css-block');
  const copyBtn = el('button', 'btn-copy');
  copyBtn.textContent = 'Copy';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(cssLines.join('\n'));
    copyBtn.textContent = 'Copied!'; setTimeout(() => copyBtn.textContent = 'Copy', 1500);
  };
  const lbl = rightPane.querySelector('.pane-label');
  lbl.appendChild(copyBtn);
  block.innerHTML = cssLines.map(l => {
    if (l.startsWith('.')) return `<span class="css-prop">${esc(l)}</span>`;
    if (l.startsWith('  ')) {
      const [p, ...r] = l.split(':');
      return `<span class="css-comment">${esc(p)}</span><span class="css-punc">:</span><span class="css-val">${esc(r.join(':'))}</span>`;
    }
    return `<span class="css-punc">${esc(l)}</span>`;
  }).join('\n');
  rightPane.appendChild(block);

  area.appendChild(leftPane);
  area.appendChild(rightPane);
}

// ─── Effects ──────────────────────────────────────────────────────────────────
function renderEffects(area) {
  const effects = extractedData.effectStyles;
  const leftPane = pane('Visual');
  const rightPane = pane('CSS values');
  const cssLines = [];

  for (const e of effects) {
    const card = el('div', 'effect-card');
    const demo = el('div', 'effect-demo');
    if (e.type === 'shadow') {
      demo.style.boxShadow = e.cssValue;
      demo.style.background = 'var(--surface)';
    } else if (e.type === 'blur') {
      demo.style.backdropFilter = e.cssValue;
      demo.style.background = 'rgba(138,56,245,0.2)';
    }
    const info = el('div', 'effect-info');
    const name = el('div', 'effect-name'); name.textContent = e.name;
    const css  = el('div', 'effect-css');  css.textContent  = e.cssValue || '(no css output)';
    info.appendChild(name); info.appendChild(css);
    card.appendChild(demo); card.appendChild(info);
    leftPane.appendChild(card);

    if (e.cssValue) {
      const varName = '--effect-' + e.name.toLowerCase().replace(/\s*\/\s*/g, '-').replace(/[^a-z0-9-]/g, '-');
      const prop = e.type === 'blur' ? 'backdrop-filter' : 'box-shadow';
      cssLines.push(`${varName}: ${e.cssValue};  /* ${prop} */`);
    }
  }

  if (!effects.length) {
    leftPane.appendChild(emptyNote('No effect styles found in this file'));
  }

  const block = el('div', 'css-block');
  const copyBtn = el('button', 'btn-copy');
  copyBtn.textContent = 'Copy';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(cssLines.join('\n'));
    copyBtn.textContent = 'Copied!'; setTimeout(() => copyBtn.textContent = 'Copy', 1500);
  };
  rightPane.querySelector('.pane-label').appendChild(copyBtn);
  block.innerHTML = cssLines.map(l => esc(l)).join('\n') || '<span class="css-comment">/* no effects */</span>';
  rightPane.appendChild(block);

  area.appendChild(leftPane); area.appendChild(rightPane);
}

// ─── Grids ────────────────────────────────────────────────────────────────────
function renderGrids(area) {
  const grids = extractedData.gridStyles;
  const leftPane = pane('Grid styles');
  const rightPane = pane('Reference');

  for (const g of grids) {
    const card = el('div', 'grid-card');
    card.innerHTML = `
      <div class="grid-card-name">${esc(g.name)}</div>
      <div class="grid-row"><span class="grid-row-label">Columns</span><span class="grid-row-val">${g.columns}</span></div>
      <div class="grid-row"><span class="grid-row-label">Gutter</span><span class="grid-row-val">${g.gutter}px</span></div>
      <div class="grid-row"><span class="grid-row-label">Margin</span><span class="grid-row-val">${g.margin}px</span></div>
      ${g.breakpoint ? `<div class="grid-row"><span class="grid-row-label">Breakpoint</span><span class="grid-row-val">${esc(g.breakpoint)}</span></div>` : ''}
    `;
    leftPane.appendChild(card);
  }

  if (!grids.length) {
    leftPane.appendChild(emptyNote('No column grid styles found. Add grid styles to your Figma file to extract them.'));
  }

  const note = el('div', 'css-block');
  note.style.color = 'var(--muted)';
  note.style.fontSize = '11px';
  note.style.lineHeight = '1.8';
  note.innerHTML = `<span class="css-comment">/* Grid colours are handover-only and excluded from\n   CSS output. They live in the "grid" variable group\n   and use 10% alpha overlays:\n\n   grid-pri · #FF0000 · 10%  (primary column)\n   grid-sec · #0000FF · 10%  (secondary)\n   grid-ter · #8A38F5 · 10%  (tertiary)\n\n   These are purely for layout visualisation in Figma\n   and should not appear in component styling. */</span>`;
  rightPane.appendChild(note);

  area.appendChild(leftPane); area.appendChild(rightPane);
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function pane(label) {
  const p = el('div', 'pane');
  const l = el('div', 'pane-label');
  l.textContent = label;
  p.appendChild(l);
  return p;
}

function section(title) {
  const s = el('div', 'section');
  const t = el('div', 'section-title');
  t.textContent = title;
  s.appendChild(t);
  return s;
}

function emptyNote(msg) {
  const d = el('div', '');
  d.style.cssText = 'font-size:11px;color:var(--muted);padding:12px 0;';
  d.textContent = msg;
  return d;
}

function gridNote() {
  const d = el('div', 'grid-note');
  d.textContent = 'Layout grid visualisation only · excluded from CSS output';
  return d;
}

function colorCard(c) {
  const card = el('div', 'color-card');
  const swatch = el('div', 'color-swatch');
  swatch.style.background = c.alpha < 1
    ? `rgba(${hexToRgbStr(c.hex)},${c.alpha})`
    : c.hex;
  const meta = el('div', 'color-meta');
  meta.innerHTML = `
    <div class="color-meta-name">${esc(c.name)}</div>
    <div class="color-meta-hex">${c.hex}${c.alpha < 1 ? ' · ' + Math.round(c.alpha * 100) + '%' : ''}</div>
    <div class="color-meta-var">${c.cssVar}</div>
  `;
  card.appendChild(swatch);
  card.appendChild(meta);
  return card;
}

function spaceCard(t, maxVal) {
  const card = el('div', 'num-card');
  const pct = Math.round((t.value / maxVal) * 100);
  card.innerHTML = `
    <div class="num-name">${esc(t.name)}</div>
    <div class="num-bar-wrap"><div class="num-bar" style="width:${pct}%"></div></div>
    <div class="num-val">${t.value}${t.unit}</div>
    <div class="num-var">${t.cssVar}</div>
  `;
  return card;
}

function radiusCard(t) {
  const card = el('div', 'radius-card');
  const demo = el('div', 'radius-demo');
  demo.style.borderRadius = t.value + 'px';
  const info = el('div', '');
  info.style.textAlign = 'center';
  info.innerHTML = `
    <div style="font-size:11px;font-family:var(--mono);font-weight:500;color:var(--text)">${esc(t.name)}</div>
    <div style="font-size:10px;font-family:var(--mono);color:var(--muted)">${t.value}${t.unit}</div>
    <div style="font-size:9px;font-family:var(--mono);color:var(--gb-comp)">${t.cssVar}</div>
  `;
  card.appendChild(demo);
  card.appendChild(info);
  return card;
}

function hexToRgbStr(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}
</script>
